name: LIBERO CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      working-directory: ./server
      run: npm install
    - name: Prisma Generate
      working-directory: ./server
      run: npx prisma generate
    - name: Lint
      working-directory: ./server
      run: npm run lint || true # Some templates have no linting scripts defined yet

  client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      working-directory: ./client
      run: npm install
    - name: Build
      working-directory: ./client
      run: npm run build
