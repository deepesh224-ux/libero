name: LIBERO CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'

    - name: Setup Full Stack
      run: |
        echo "Installing dependencies..."
        cd server && npm install && npx prisma generate
        cd ../client && npm install --legacy-peer-deps
        
    - name: Lint and Test Server
      run: |
        cd server
        npm run lint
        npm test
        
    - name: Lint, Test and Build Client
      run: |
        cd client
        npm run lint
        npm test
        npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          cd /path/to/project
          git pull origin main
          cd server
          npm install
          npx prisma generate
          pm2 restart server
          cd ../client
          npm install
          npm run build
