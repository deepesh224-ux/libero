name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1                   # set this to your preferred AWS region
  ECR_REPOSITORY_SERVER: football-server  # set this to your Amazon ECR repository name
  ECR_REPOSITORY_CLIENT: football-client  # set this to your Amazon ECR repository name
  ECS_SERVICE_SERVER: football-server-service # set this to your Amazon ECS service name
  ECS_SERVICE_CLIENT: football-client-service # set this to your Amazon ECS service name
  ECS_CLUSTER: football-cluster           # set this to your Amazon ECS cluster name
  SERVER_TASK_DEFINITION: .aws/server-task-def.json
  CLIENT_TASK_DEFINITION: .aws/client-task-def.json
  SERVER_CONTAINER_NAME: server
  CLIENT_CONTAINER_NAME: client
  ALB_DNS: football-alb-1862504128.us-east-1.elb.amazonaws.com

permissions:
  contents: read
  id-token: write # required for AWS OIDC

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Server Build and Push
      - name: Build, tag, and push server image to Amazon ECR
        id: build-image-server
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_SERVER:$IMAGE_TAG ./server
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_SERVER:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_SERVER:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_SERVER:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_SERVER:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_SERVER:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Client Build and Push
      - name: Build, tag, and push client image to Amazon ECR
        id: build-image-client
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_CLIENT:$IMAGE_TAG ./client
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CLIENT:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_CLIENT:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_CLIENT:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CLIENT:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_CLIENT:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Inject secrets into server task definition
      - name: Inject secrets into server task definition
        run: |
          sed -i 's|PLACEHOLDER.*JWT_SECRET.*|${{ secrets.JWT_SECRET }}|g' ${{ env.SERVER_TASK_DEFINITION }} || true
          # Replace placeholder values with real secrets
          python3 -c "
          import json, sys
          with open('${{ env.SERVER_TASK_DEFINITION }}') as f:
              td = json.load(f)
          env = td['containerDefinitions'][0]['environment']
          secrets = {
              'JWT_SECRET': '${{ secrets.JWT_SECRET }}',
              'RAZORPAY_KEY_ID': '${{ secrets.RAZORPAY_KEY_ID }}',
              'RAZORPAY_KEY_SECRET': '${{ secrets.RAZORPAY_KEY_SECRET }}',
          }
          for e in env:
              if e['name'] in secrets:
                  e['value'] = secrets[e['name']]
          with open('${{ env.SERVER_TASK_DEFINITION }}', 'w') as f:
              json.dump(td, f, indent=2)
          print('✅ Secrets injected into task definition')
          "

      # Update Task Definitions
      - name: Fill in the new image ID in the server task definition
        id: task-def-server
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.SERVER_TASK_DEFINITION }}
          container-name: ${{ env.SERVER_CONTAINER_NAME }}
          image: ${{ steps.build-image-server.outputs.image }}

      - name: Fill in the new image ID in the client task definition
        id: task-def-client
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.CLIENT_TASK_DEFINITION }}
          container-name: ${{ env.CLIENT_CONTAINER_NAME }}
          image: ${{ steps.build-image-client.outputs.image }}

      # Deploy to ECS
      - name: Deploy server to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def-server.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_SERVER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Deployment Summary
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 Frontend: http://${{ env.ALB_DNS }}"
          echo "🔌 Backend:  http://${{ env.ALB_DNS }}:5001/api/products"
      - name: Deploy client to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def-client.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_CLIENT }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false
